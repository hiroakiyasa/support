# 完全統合されたindex.htmlファイルを作成します

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- 他のヘッダーコンテンツは元のindex.htmlから継承 -->
</head>

<body class="gpt-app">
  <!-- ナビゲーションバー -->
  <nav class="navbar">
    <div class="container navbar-container">
      <div class="navbar-logo">
        <img src="logo.PNG" alt="TrailFusion Logo">
        <h2>TrailFusion AI</h2>
      </div>
      <div class="navbar-menu" id="navbar-menu">
        <button class="nav-link company-intro-btn" onclick="openCompanyModal()" data-i18n-key="nav_company" style="background: none; border: none; cursor: pointer; font-size: inherit; color: inherit; padding: 0; font-family: inherit; text-decoration: none;">会社紹介</button>
        <a href="#" class="nav-link apps-intro-btn" data-target="apps-section" data-i18n-key="nav_apps">アプリ紹介</a>
        <a href="#" class="nav-link vanlife-intro-btn" data-target="vanlife-section" data-i18n-key="nav_vanlife">キャンピングカー紹介</a>
        <a href="#contact" class="nav-link contact-btn" data-i18n-key="nav_contact">お問い合わせ</a>
      </div>
    </div>
  </nav>

  <!-- 元のメインコンテンツはそのまま維持 -->
  
  <!-- 会社紹介モーダル -->
  <div id="company-modal" class="company-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); z-index: 10000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;">
    <div class="modal-content" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 25%, #2563eb 50%, #7c3aed 75%, #0f172a 100%); border-radius: 1rem; max-width: 90vw; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);">
      <button class="modal-close" onclick="closeCompanyModal()" style="position: absolute; top: 1rem; right: 1rem; background: rgba(255, 255, 255, 0.1); border: none; color: #ffffff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10001; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: all 0.3s ease; backdrop-filter: blur(10px);">
        <i class="fas fa-times"></i>
      </button>
      <div class="modal-body" style="padding: 2rem; color: #ffffff;">
        <!-- about_section.htmlの内容をそのまま挿入 -->
        <!-- [ここにabout_section.htmlの完全な内容が入ります] -->
      </div>
    </div>
  </div>

  <script>
    // 会社紹介モーダル機能
    function openCompanyModal() {
      const modal = document.getElementById('company-modal');
      if (modal) {
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        setTimeout(() => {
          modal.style.opacity = '1';
        }, 10);
      }
    }

    function closeCompanyModal() {
      const modal = document.getElementById('company-modal');
      if (modal) {
        modal.style.opacity = '0';
        document.body.style.overflow = 'auto';
        setTimeout(() => {
          modal.style.display = 'none';
        }, 300);
      }
    }

    // モーダル外クリックで閉じる
    document.addEventListener('click', function(event) {
      const modal = document.getElementById('company-modal');
      if (modal && event.target === modal) {
        closeCompanyModal();
      }
    });

    // ESCキーでモーダルを閉じる
    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        closeCompanyModal();
      }
    });
  </script>
</body>
</html>
